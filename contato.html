<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="reset.css"
    <link rel="stylesheet" href="style.css"

</head>
<body>
    <header>
        <div class="caixa">
            <hi><img src="logo.png" alt""></hi>
            <nav>
                <ul>
                   <li><a href="index.html">Home</a></li>
                   <li><a href="produtos.html">Home</a></li>
                   <li><a href="contato.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>  
        
    <main>
        <form action="">
            <label for="nomesobrenome">Nome e sobrenome</label>
            <input type="text"id="nomesobrenome">

            <label for= Email >Email</label>
            <input type="text"id="Email">
            
            <label for= telefone >telefone</label>
            <input type="text"id="telefone">

            <label for="mensagem" >Mensagem</label>
            <textarea id="mensagem" cols="70" rows="10"><</textarea>

            <div>
                <p>Como prefere o nosso contato?</p>
                <label for="radio-email">
                    <input type="radio" name="contato" value="Email" id="radio-email">Email
                <label> 
                <label for="radio-telefone">
                    <input type="radio" name="contato" value="telefone" id="radio-telefone">telefone
                </label>
                <label for="radio-whatsapp">
                    <input type="radio" name="contato" value="whatsapp" id="radio-whatsapp">telefone
                </label>

            </div>
            <div>
                 <p>Qual horario prefere ser atendido?</p>
                 <select >
                   <option>Manhã</option>
                   <option>Tarde</option>
                   <option>Noite</option>
                 </select>
            </div>
            <label class="checkbox">
                <input type="checkbox">
                Gostaria de receber nossas novidades por email?
            </label>

            <input type="submit" id="enviar formulario"
        </form>
    </main>
